version: '3.8'
services:
  email-handler:
    build: .
    ports:
      - "8503:8000"
    environment:
      - AUTH_DIR=/app/auth
      - LLM_PROVIDER=ollama
      - LLM_MODEL=phi4-mini
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - .:/app
      - auth_data:/app/auth
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  auth_data:
