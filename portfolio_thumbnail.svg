<svg xmlns="http://www.w3.org/2000/svg" width="680" height="454" viewBox="0 0 680 454">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161B27;stop-opacity:1" />
    </linearGradient>
    <!-- Accent gradient (teal/cyan) -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099FF;stop-opacity:1" />
    </linearGradient>
    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E2736;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161D2B;stop-opacity:1" />
    </linearGradient>
    <!-- Badge gradient -->
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#0099FF;stop-opacity:0.15" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft glow blue -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundCorner">
      <rect width="680" height="454" rx="16" ry="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="680" height="454" rx="16" ry="16" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#FFFFFF" stroke-width="1">
    <line x1="0" y1="75" x2="680" y2="75"/>
    <line x1="0" y1="150" x2="680" y2="150"/>
    <line x1="0" y1="225" x2="680" y2="225"/>
    <line x1="0" y1="300" x2="680" y2="300"/>
    <line x1="0" y1="375" x2="680" y2="375"/>
    <line x1="85" y1="0" x2="85" y2="454"/>
    <line x1="170" y1="0" x2="170" y2="454"/>
    <line x1="255" y1="0" x2="255" y2="454"/>
    <line x1="340" y1="0" x2="340" y2="454"/>
    <line x1="425" y1="0" x2="425" y2="454"/>
    <line x1="510" y1="0" x2="510" y2="454"/>
    <line x1="595" y1="0" x2="595" y2="454"/>
  </g>

  <!-- Decorative glow orbs -->
  <circle cx="580" cy="80" r="120" fill="#0099FF" opacity="0.06"/>
  <circle cx="100" cy="380" r="100" fill="#00D4AA" opacity="0.05"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="680" height="4" rx="0" fill="url(#accentGrad)"/>

  <!-- ── HEADER SECTION ── -->
  <!-- Brand tag top-left -->
  <rect x="24" y="22" width="110" height="26" rx="13" fill="url(#badgeGrad)" stroke="#00D4AA" stroke-width="1" stroke-opacity="0.5"/>
  <text x="79" y="39" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#00D4AA" text-anchor="middle" letter-spacing="1">KIMAKAai</text>

  <!-- "AI PORTFOLIO PROJECT" tag top-right -->
  <rect x="546" y="22" width="110" height="26" rx="13" fill="#0099FF" fill-opacity="0.12" stroke="#0099FF" stroke-width="1" stroke-opacity="0.4"/>
  <text x="601" y="39" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#0099FF" text-anchor="middle" letter-spacing="0.8">PORTFOLIO PROJECT</text>

  <!-- ── HERO EMAIL ICON ── -->
  <!-- Outer glow ring -->
  <circle cx="340" cy="118" r="56" fill="#0099FF" opacity="0.08" filter="url(#softGlow)"/>
  <circle cx="340" cy="118" r="46" fill="#1E2736" stroke="url(#accentGrad)" stroke-width="2"/>

  <!-- Email envelope icon -->
  <g transform="translate(316, 96)">
    <!-- Envelope body -->
    <rect x="0" y="0" width="48" height="36" rx="4" fill="none" stroke="url(#accentGrad)" stroke-width="2.2"/>
    <!-- Envelope flap (V shape) -->
    <polyline points="0,0 24,20 48,0" fill="none" stroke="url(#accentGrad)" stroke-width="2.2" stroke-linejoin="round"/>
    <!-- AI spark in bottom-right of envelope -->
    <circle cx="38" cy="28" r="8" fill="#0D1117"/>
    <text x="38" y="32" font-family="Arial" font-size="10" fill="#00D4AA" text-anchor="middle" font-weight="bold">✦</text>
  </g>

  <!-- ── TITLE & SUBTITLE ── -->
  <text x="340" y="200" font-family="'Segoe UI', Arial, sans-serif" font-size="30" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="-0.5">AI Email Triaging Assistant</text>
  <text x="340" y="226" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#8B9AB5" text-anchor="middle" letter-spacing="0.3">Autonomous Inbox Intelligence · OAuth Secured · LLM Powered</text>

  <!-- Accent divider line -->
  <line x1="280" y1="243" x2="400" y2="243" stroke="url(#accentGrad)" stroke-width="2" stroke-linecap="round"/>

  <!-- ── FEATURE CARDS ROW ── -->
  <!-- Card 1: Gmail OAuth -->
  <rect x="24" y="262" width="190" height="92" rx="10" fill="url(#cardGrad)" stroke="#2A3547" stroke-width="1"/>
  <rect x="24" y="262" width="190" height="3" rx="2" fill="#00D4AA" opacity="0.7"/>
  <!-- Gmail icon (G) -->
  <circle cx="55" cy="293" r="14" fill="#EA4335" opacity="0.85"/>
  <text x="55" y="298" font-family="Arial" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">G</text>
  <text x="80" y="291" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">Gmail OAuth 2.0</text>
  <text x="80" y="307" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#6B7FA3">Zero-credential exposure</text>
  <text x="34" y="336" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8B9AB5">Secure token flow — no</text>
  <text x="34" y="349" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8B9AB5">password storage ever</text>

  <!-- Card 2: AI Processing -->
  <rect x="245" y="262" width="190" height="92" rx="10" fill="url(#cardGrad)" stroke="#2A3547" stroke-width="1"/>
  <rect x="245" y="262" width="190" height="3" rx="2" fill="#0099FF" opacity="0.7"/>
  <!-- AI brain icon -->
  <circle cx="276" cy="293" r="14" fill="#0099FF" opacity="0.2"/>
  <text x="276" y="298" font-family="Arial" font-size="15" fill="#0099FF" text-anchor="middle">🤖</text>
  <text x="300" y="291" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">LLM Processing</text>
  <text x="300" y="307" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#6B7FA3">Gemini / Ollama ready</text>
  <text x="255" y="336" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8B9AB5">Extracts urgency, actions</text>
  <text x="255" y="349" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8B9AB5">and summaries via prompts</text>

  <!-- Card 3: Docker Deploy -->
  <rect x="466" y="262" width="190" height="92" rx="10" fill="url(#cardGrad)" stroke="#2A3547" stroke-width="1"/>
  <rect x="466" y="262" width="190" height="3" rx="2" fill="url(#accentGrad)" opacity="0.7"/>
  <!-- Docker icon -->
  <circle cx="497" cy="293" r="14" fill="#0099FF" opacity="0.15"/>
  <text x="497" y="299" font-family="Arial" font-size="15" fill="#0099FF" text-anchor="middle">🐳</text>
  <text x="520" y="291" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">1-Click Docker</text>
  <text x="520" y="307" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#6B7FA3">Live on Docker Hub</text>
  <text x="476" y="336" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8B9AB5">Fully containerized — run</text>
  <text x="476" y="349" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8B9AB5">anywhere in seconds</text>

  <!-- ── TECH STACK PILLS ── -->
  <text x="340" y="384" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#6B7FA3" text-anchor="middle" letter-spacing="1.5">TECH STACK</text>

  <!-- Python pill -->
  <rect x="80" y="392" width="70" height="24" rx="12" fill="#3776AB" fill-opacity="0.2" stroke="#3776AB" stroke-width="1" stroke-opacity="0.5"/>
  <text x="115" y="408" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#6BA3D6" text-anchor="middle">Python</text>

  <!-- Flask/FastAPI pill -->
  <rect x="162" y="392" width="70" height="24" rx="12" fill="#009688" fill-opacity="0.2" stroke="#009688" stroke-width="1" stroke-opacity="0.5"/>
  <text x="197" y="408" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#4DB6AC" text-anchor="middle">FastAPI</text>

  <!-- Streamlit pill -->
  <rect x="244" y="392" width="76" height="24" rx="12" fill="#FF4B4B" fill-opacity="0.2" stroke="#FF4B4B" stroke-width="1" stroke-opacity="0.4"/>
  <text x="282" y="408" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#FF7777" text-anchor="middle">Streamlit</text>

  <!-- Docker pill -->
  <rect x="332" y="392" width="65" height="24" rx="12" fill="#0099FF" fill-opacity="0.15" stroke="#0099FF" stroke-width="1" stroke-opacity="0.4"/>
  <text x="364" y="408" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#5BB8FF" text-anchor="middle">Docker</text>

  <!-- Gemini pill -->
  <rect x="409" y="392" width="70" height="24" rx="12" fill="#8E44AD" fill-opacity="0.2" stroke="#8E44AD" stroke-width="1" stroke-opacity="0.5"/>
  <text x="444" y="408" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#BB8FD4" text-anchor="middle">Gemini AI</text>

  <!-- Gmail API pill -->
  <rect x="491" y="392" width="82" height="24" rx="12" fill="#EA4335" fill-opacity="0.15" stroke="#EA4335" stroke-width="1" stroke-opacity="0.4"/>
  <text x="532" y="408" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#EF9A9A" text-anchor="middle">Gmail API</text>

  <!-- ── BOTTOM BAR ── -->
  <rect x="0" y="430" width="680" height="24" rx="0" fill="#0D1117" opacity="0.6"/>
  <rect x="0" y="450" width="680" height="4" rx="0" fill="url(#accentGrad)" opacity="0.5"/>

  <!-- Bottom left: open source badge -->
  <text x="24" y="446" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4A5568">⭐ Open Source</text>

  <!-- Bottom center: tagline -->
  <text x="340" y="446" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4A5568" text-anchor="middle">github.com/kimsoa · Available for freelance projects</text>

  <!-- Bottom right: type badge -->
  <text x="652" y="446" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4A5568" text-anchor="end">Automation · AI</text>

</svg>
