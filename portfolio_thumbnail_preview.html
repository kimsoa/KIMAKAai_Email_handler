<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>KIMAKAai Email Handler — Upwork Thumbnail</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0D14;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, Arial, sans-serif;
    }
    .instructions {
      color: #6B7FA3;
      font-size: 13px;
      margin-bottom: 20px;
      text-align: center;
    }
    .instructions code {
      background: #1E2736;
      color: #00D4AA;
      padding: 2px 7px;
      border-radius: 4px;
      font-family: monospace;
    }
    .thumb-wrapper {
      width: 680px;
      height: 454px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,153,255,0.15), 0 8px 32px rgba(0,0,0,0.5);
    }
    .thumb-wrapper img, .thumb-wrapper object {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <p class="instructions">
    Upwork thumbnail preview — 680 × 454 px &nbsp;|&nbsp;
    Screenshot this page or right-click the image and <code>Save as PNG</code>
  </p>
  <div class="thumb-wrapper">
    <img src="portfolio_thumbnail.svg" alt="KIMAKAai Email Handler Upwork Thumbnail" width="680" height="454"/>
  </div>
</body>
</html>
